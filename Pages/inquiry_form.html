<body>

<div>

<h2 class="headline"> Inquiry form </h2>
<p>
    <b><i>Please use this form to request a website, get a quotation and/or communicate with us directly 

    </i></b>
</p>


<div class="inquiry_form">
    <h2><i> Please fill this form. </i></h2>
    <p id="submitMessage"></p>
    <form>
        <input type="text" placeholder="Business name" size="40" name="client-name" required/> </br>
        <input type="email" placeholder="example@mail.com" required/> </br>
        <select name="Service">
            <option> Website Design</input>
            <option> E-commerce</input>
            <option> Online Marketing</input> 	 
        </select> </br>
        <input type="number" placeholder="Budget in RWF" name="means"/> </br>
        <label for="Additional Information"> Additional Information </label> </br>
        <textarea name="Additional Informaiton" cols="20" rows="10">
        </textarea> </br>


        <input type="submit" label="submit"/>
    </form>
</div>
<script>
    var form = document.querySelector(".inquiry_form form");
    var message = document.getElementById("submitMessage");
    form.onsubmit = function (event) {
        event.preventDefault();
        message.innerHTML = "Thank you! Your inquiry has been received.";
        
    };
</script>


</body>
</html>
